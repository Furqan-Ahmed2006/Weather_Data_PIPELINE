name: End-to-End Weather ETL & MLOps Pipeline

on:
  schedule:
    - cron: '0 * * * *'  
  workflow_dispatch:     

jobs:
  run-pipeline:
    runs-on: ubuntu-latest

    steps:
  
    - name: Checkout Repository Code
      uses: actions/checkout@v3
      with:
        token: ${{ secrets.GITHUB_TOKEN }}


    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

  
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

  
    - name: Execute Full Data & ML Pipeline
      env:
        DB_HOST: ${{ secrets.DB_HOST }}
        DB_PORT: ${{ secrets.DB_PORT }}
        DB_USER: ${{ secrets.DB_USER }}
        DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
        DB_NAME: ${{ secrets.DB_NAME }}
      run: |
        echo "Executing: Data Ingestion..."
        python data_ingestion.py
        
        echo "Executing: Data Transformation..."
        python transformation.py
        
        echo "Executing: Loading Data to Aiven Cloud..."
        python load_data.py
        
        echo "Executing: Automated ML Model Training & Evaluation..."
        python train_model.py

  
    - name: Configure Git
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"

  
    - name: Commit and Push Updated Model (If Better)
      run: |
        git add weather_model.pkl model_score.txt clean_weather.csv raw_weather.json
        git commit -m "🤖 Automated: Pipeline executed & ML model updated with better performance" || exit 0
        git push origin main